[[plugins]]
    repo = 'neoclide/coc.nvim'
    rev = 'release'
    on_i = 1
    merged = '0'
    hook_source = '''
        " ----------------------------------マッピング----------------------------------
        nnoremap <silent> <space><space> :<C-u>call <SID>show_documentation()<CR>
        nmap              !              <Plug>(coc-codeaction)
        nmap     <silent> @              <Plug>(coc-references)
        nmap     <silent> #              <Plug>(coc-definition)
        nmap              $              <Plug>(coc-rename)
        nnoremap <silent> ^              :<C-u>CocList actions<cr>
        nnoremap <silent> &              :<C-u>CocList diagnostics<cr>
        nnoremap <silent> *              :<C-u>CocList outline<cr>
        nmap     <silent> (              <Plug>(coc-diagnostic-prev)
        nmap     <silent> )              <Plug>(coc-diagnostic-next)
        nnoremap <silent> <space>r       :<C-u>CocRestart<CR>:<C-u>GitGutterAll<CR>
        " ------------------------------------------------------------------------------



        " --------------------------------その他の設定--------------------------------
        " =======プレースホルダーの移動=======
        " これをしないと <C-j> と <C-k> にスニペットの移動がマッピングされて補完の選択ができなくなってしまう
        let g:coc_snippet_next = "<C-n>"
        let g:coc_snippet_prev = "<C-p>"
        " =======コマンド定義=======
        command! -nargs=0 Format :call CocAction('format')
        command! -nargs=? Fold :call     CocAction('fold', <f-args>)
        command! -nargs=0 OR   :call     CocAction('runCommand', 'editor.action.organizeImport')
        " 関数（定義参照で使う関数）
        function! s:show_documentation()
            if (index(['vim','help'], &filetype) >= 0)
                execute 'h '.expand('<cword>')
            else
                call CocAction('doHover')
            endif
        endfunction
        " =======オートコマンド=======
        autocmd CursorHold * silent call CocActionAsync('highlight')
        augroup mygroup
            autocmd!
            " Setup formatexpr specified filetype(s).
            autocmd FileType typescript,json setl formatexpr=CocAction('formatSelected')
            " Update signature help on jump placeholder
            autocmd User CocJumpPlaceholder call CocActionAsync('showSignatureHelp')
        augroup end
        " =======ステータスラインの設定=======
        set statusline^=%{coc#status()}%{get(b:,'coc_current_function','')}
        " ------------------------------------------------------------------------------



        " -----------------------------使ってないマッピング-----------------------------
        " =======マッピングのリーダー=======
        " nnoremap [coc] <nop>
        " nmap <space><space> [coc]
        " =======cocList=======
        " nnoremap <silent> [coc]f :<C-u>CocNext<CR>
        " nnoremap <silent> [coc]d :<C-u>CocPrev<CR>
        " nnoremap <silent> [coc]s :<C-u>CocListResume<CR>
        " nnoremap <silent> [coc]a :<C-u>CocList commands<cr>
        " nnoremap <silent> [coc]w :<C-u>CocList -I symbols<cr>
        " nnoremap <silent> [coc]q :<C-u>CocList extensions<cr>
        " =======LSP=======
        " nmap     <silent> [coc]l <Plug>(coc-type-definition)
        " nmap     <silent> [coc]i <Plug>(coc-implementation)
        " nmap              [coc]h <Plug>(coc-fix-current)
        " =======LSP2=======
        " xmap             [coc]y <Plug>(coc-codeaction-selected)
        " nmap             [coc]y <Plug>(coc-codeaction-selected)
        " xmap <silent>     [coc]g <Plug>(coc-range-select)
        " nmap <silent>     [coc]g <Plug>(coc-range-select)
        " xmap              [coc]t <Plug>(coc-format-selected)
        " nmap              [coc]t <Plug>(coc-format-selected)
        " =======テキストオブジェクト （関数）=======
        " xmap if <Plug>(coc-funcobj-i)
        " xmap af <Plug>(coc-funcobj-a)
        " map if <Plug>(coc-funcobj-i)
        " map af <Plug>(coc-funcobj-a)
        " ------------------------------------------------------------------------------



        " -----------------------------------環境構築-----------------------------------
        " コマンドラインで実行した → ~/.config/coc/extensions/node_modules に拡張が追加
        " :CocInstall coc-json coc-solargraph coc-tsserver coc-eslint
        " Solargraph のために ruby のバージョンは 2.5.1 が必要っぽい？
        " $ gem install neovim; gem install solargraph
        " $ bundle update --bundler
        " $ gem install bundler:1.17.3
        " ------------------------------------------------------------------------------
    '''


[[plugins]]
    repo = 'cespare/vim-toml'
    on_ft = ['toml']


[[plugins]]
    repo = 'inkarkat/vim-SyntaxRange'
    on_ft = ['toml']


[[plugins]]
    repo = 'MaxMEllon/vim-jsx-pretty'
    on_ft = ['javascript', 'javascriptreact', 'typescriptreact']
    hook_source = '''
        let g:vim_jsx_pretty_highlight_close_tag = 1
        let g:vim_jsx_pretty_colorful_config = 1
    '''


[[plugins]]
    repo = 'leafgarland/typescript-vim'
    on_ft = ['typescript', 'typescriptreact']


[[plugins]]
    repo = 'plasticboy/vim-markdown'
    on_ft = ['markdown']
    hook_source = '''
        " 折りたたみを無効
        let g:vim_markdown_folding_disabled = 1
        " 折りたたみのレベルを設定
        let g:vim_markdown_folding_level = 2
        " 強調を一行に制限
        let g:vim_markdown_emphasis_multiline = 0
        " イタリックなどを conceal しない
        let g:vim_markdown_conceal = 0
        " コードブロックを conceal しない
        let g:vim_markdown_conceal_code_blocks = 0
        " 数式を conceal しない
        let g:tex_conceal = ""
        " $x$ でインライン数式 $$x$$ でディスプレイ数式
        let g:vim_markdown_math = 1
        " 自動で箇条書きの接頭語を挿入する
        let g:vim_markdown_auto_insert_bullets = 0
        let g:vim_markdown_new_list_item_indent = 0
    '''


[[plugins]]
    repo = 'iamcco/markdown-preview.nvim'
    on_ft = ['markdown', 'pandoc.markdown', 'rmd']
    build = 'cd app & yarn install'
    hook_source = '''
        nmap              [localmap]<C-l> <Plug>MarkdownPreviewToggle
        nnoremap <silent> [localmap]<C-k> :<C-u>TableFormat<CR>
        nnoremap          [localmap]<C-j> <esc>o<div style="text-align:center;"><img src="" width=50%></div><esc>F"i
        inoremap <expr>   [localmap]<C-j> expand("<cWORD>")=~"^\\" ? "\<esc>yyplcwend\<esc>O\<Tab>" : ""
        " markdown バッファを開いたときにプレビューを表示する
        let g:mkdp_auto_start = 0
        " 違うバッファに映った時にプレビューを閉じる
        let g:mkdp_auto_close = 0
        " セーブしたタイミングのみプレビューを更新する
        let g:mkdp_refresh_slow = 0
        " .md 以外のファイルに対しても有効にする
        let g:mkdp_command_for_global = 0
        " set to 1, preview server available to others in your network by default, the server listens on localhost (127.0.0.1)
        let g:mkdp_open_to_the_world = 0
        " use custom IP to open preview page useful when you work in remote vim and preview on local browser
        let g:mkdp_open_ip = ''
        " プレビューページを開くブラウザを指定する
        let g:mkdp_browser = 'Google Chrome'
        " set to 1, echo preview page url in command line when open preview page
        let g:mkdp_echo_preview_url = 0
        " a custom vim function name to open preview page. this function will receive url as param
        let g:mkdp_browserfunc = ''
        " use a custom markdown style must be absolute path
        let g:mkdp_markdown_css = ''
        " use a custom highlight style must absolute path
        let g:mkdp_highlight_css = ''
        " use a custom port to start server or random for empty
        let g:mkdp_port = ''
        " preview page title
        " ${name} will be replace with the file name
        let g:mkdp_page_title = '${name}'
        " options for markdown render
        " mkit: markdown-it options for render
        " katex: katex options for math
        " uml: markdown-it-plantuml options
        " maid: mermaid options
        " disable_sync_scroll: if disable sync scroll, default 0
        " sync_scroll_type: 'middle', 'top' or 'relative', default value is 'middle'
        "   middle: mean the cursor position alway show at the middle of the preview page
        "   top: mean the vim top viewport alway show at the top of the preview page
        "   relative: mean the cursor position alway show at the relative positon of the preview page
        " hide_yaml_meta: if hide yaml metadata, default is 1
        " sequence_diagrams: js-sequence-diagrams options
        let g:mkdp_preview_options = {
            \ 'mkit': {},
            \ 'katex': {},
            \ 'uml': {},
            \ 'maid': {},
            \ 'disable_sync_scroll': 0,
            \ 'sync_scroll_type': 'middle',
            \ 'hide_yaml_meta': 1,
            \ 'sequence_diagrams': {}
            \ }
    '''


[[plugins]]
    repo = 'godlygeek/tabular'
    on_ft = ['markdown']


[[plugins]]
    repo = 'lervag/vimtex'
    on_ft = ['tex']
    hook_source = '''
        " skimとの連携の設定このurlの場所からパクった
        " https://qiita.com/KeitaNakamura/items/87dad47dc09ae8bf6abf
        let g:vimtex_compiler_progname = 'nvr'
        let g:vimtex_view_general_viewer = '/Applications/Skim.app/Contents/SharedSupport/displayline'
        let g:vimtex_view_general_options = '@line @pdf @tex'
        " 消してなければ自分で書いたドキュメントにこの後の設定の説明があるはず
        let g:vimtex_complete_close_braces = 1
        let g:vimtex_imaps_enabled = 0
        let g:vimtex_mappings_disable = {
            \ 'n': ['<localleader>lr', '<localleader>lm', 'tsc', 'tse', 'tsd', 'tsD', '<F7>'],
            \ 'x': ['tsd', 'tsD', '<F7>'],
            \ 'i': ['<F7>'],
            \}
        nmap [localmap]2 <plug>(vimtex-compile)
        nmap [localmap]3 <plug>(vimtex-view)
        nmap [localmap]4 <plug>(vimtex-toc-open)
        nmap [localmap]k <plug>(vimtex-doc-package)
        imap <C-a><C-a> <plug>(vimtex-delim-close)
        " 警告のみの時は quickfix を開かない
        let g:vimtex_quickfix_open_on_warning = 0
        " quickfix を自動的に閉じる
        let g:vimtex_quickfix_autoclose_after_keystrokes = 2
        " 折りたたみを有効にする
        let g:vimtex_fold_enabled = 1
        " toc を左側に幅広く表じさせる
        let g:vimtex_toc_config = {
            \ 'show_help': 0,
            \ 'split_pos': 'vert rightbelow',
            \ 'split_width' : 60,
            \ 'todo_sorted': 0,
            \}
    '''

[[plugins]]
    repo = 'neovimhaskell/haskell-vim'
    on_ft = ['haskell']
    hook_source = '''
        filetype plugin indent on
        let g:haskell_enable_quantification = 1
        let g:haskell_enable_recursivedo = 1
        let g:haskell_enable_arrowsyntax = 1
        let g:haskell_enable_pattern_synonyms = 1
        let g:haskell_enable_typeroles = 1
        let g:haskell_enable_static_pointers = 1
        let g:haskell_backpack = 1
    '''


[[plugins]]
    repo = 'derekwyatt/vim-scala'
    on_ft = ['scala']
